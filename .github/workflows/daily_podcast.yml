name: Daily Podcast

on:
  schedule:
    - cron: '0 14 * * *'   # 9am ET (UTC-5) = 14:00 UTC
  workflow_dispatch:         # Also allows manual "Run workflow" button on GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Set up NotebookLM auth
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NOTEBOOKLM_STORAGE }}" | base64 -d > ~/.notebooklm/profiles/default/storage_state.json

      - name: Run pipeline
        env:
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          R2_ACCOUNT_ID:           ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:          ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN:        ${{ secrets.R2_PUBLIC_DOMAIN }}
          GITHUB_USERNAME:         ${{ secrets.FEED_GITHUB_USERNAME }}
          GITHUB_REPO:             ${{ secrets.FEED_GITHUB_REPO }}
          GITHUB_TOKEN:            ${{ secrets.FEED_TOKEN }}
          GITHUB_FEED_PATH:        feed.xml
          PODCAST_COVER_URL:       ${{ secrets.PODCAST_COVER_URL }}
          PODCAST_TITLE:           "The Latency Report"
          PODCAST_DESCRIPTION:     ${{ secrets.PODCAST_DESCRIPTION }}
          PODCAST_AUTHOR:          ${{ secrets.PODCAST_AUTHOR }}
          PODCAST_EMAIL:           ${{ secrets.PODCAST_EMAIL }}
          DAILY_LIMIT:             "1"
        run: python scripts/run_pipeline.py
